
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiambrissima · ofertas rotativas</title>
  <style>
    /* ===================== RESET ===================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===================== VARIABLES ===================== */
    :root {
      --color-bg: #f5f5f7;
      --color-surface: #ffffff;
      --color-text: #1e1e1e;
      --color-price-bg: #d32f2f;      /* rojo fuerte */
      --color-price-text: #ffeb3b;     /* amarillo brillante */
      --color-discount-badge: #f9a825; /* dorado/ámbar */
      --color-bank-promo: #2c3e50;
      --shadow-card: 0 10px 20px rgba(0, 0, 0, 0.08), 0 6px 6px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.02);
      --border-radius-card: 24px;
      --border-radius-small: 16px;
      --transition-default: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    /* ===================== BASE ===================== */
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      
      background-color: #d32f2f;
      color: var(--color-text);
      line-height: 1.4;
      padding: 24px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* tipografía bold de impacto */
    h1, h2, h3, .price-tag, .product-name {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
    }

    /* ===================== LAYOUT PRINCIPAL (1920x1080 READY) ===================== */
    .signage {
      width: 1920px;
      max-width: 100%;
      height: 1000px;  /* flexible, pero respeta relación */
      max-height: 100vh;
      background-color: #d32f2f;
      border-radius: 40px;
      border-radius: 0;
      box-shadow: var(--shadow-card);
      display: flex;
      overflow: hidden;
      backdrop-filter: blur(2px);
      transition: var(--transition-default);
    }

    /* columna izquierda 40% */
    .left-panel {
      flex: 0 0 40%;
      background: linear-gradient(145deg, #ffffff 0%, #f9f9fc 100%);
      background-color: #d32f2f;
      padding: 32px 28px;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      gap: 0;
      border-right: 1px solid rgba(0,0,0,0.03);
    }

    /* producto destacado grande */
    .featured-product {
      flex: 1;
      background: var(--color-surface);
      border-radius: var(--border-radius-card);
      box-shadow: var(--shadow-card);
      padding: 28px 20px 20px 20px;
      padding: 0;
      display: flex;
      flex-direction: column;
      transition: var(--transition-default);
      border: 1px solid rgba(255,255,255,0.5);
      position: relative;
      overflow: hidden;
    }

    .featured-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--color-discount-badge);
      background: #d32f2f;
      color: #1e1e1e;
      color: var(--color-surface);
      font-weight: 800;
      font-size: 2.2rem;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 12px rgba(0,0,0,0.2);
      border: 4px solid white;
      z-index: 5;
    }

    .featured-badge span {
      transform: rotate(5deg);
    }

    .featured-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding: 0;
      max-height: 260px;
    }

    .featured-image img {
      max-height: 220px;
      width: auto;
      transition: transform 0.3s ease;
    }

    .featured-product:hover .featured-image img {
      transform: scale(1.02);
    }

    .featured-name {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 8px 0 8px;
      margin: 0;
      line-height: 1.1;
    }

    /* precio repetido 3 veces en cajas rojas (destacado) */
    .price-row {
      display: flex;
      gap: 12px;
      gap: 0;
      margin: 12px 0 8px;
      margin: 0;
      flex-wrap: wrap;
    }

    .price-chip {
      background: var(--color-price-bg);
      background: #d32f2f;
      color: var(--color-price-text);
      padding: 12px 24px;
      padding: 0;
      border-radius: 60px;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1;
      box-shadow: 0 6px 0 #8b1e1e;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      gap: 0;
      letter-spacing: 1px;
    }

    .price-chip small {
      font-size: 1.2rem;
      font-weight: 600;
      opacity: 0.9;
    }

    /* promos bancarias inferiores */
    .bank-promos {
      background: #1e2b38;
      background-image: radial-gradient(circle at 0% 30%, #2c4054, #16222c);
      border-radius: 22px;
      padding: 22px 20px;
      padding: 0;
      color: white;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 12px;
      gap: 0;
      margin-top: 10px;
      margin-top: 0;
    }

    .bank-promos h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #ffd966;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .bank-logos {
      display: flex;
      gap: 24px;
      gap: 0;
      align-items: center;
      flex-wrap: wrap;
    }

    .bank-item {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      padding: 10px 20px;
      padding: 0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.3rem;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .bank-item span {
      color: #ffd966;
      margin-left: 8px;
      margin-left: 0;
    }

    /* columna derecha 60% grid 2x2 */
    .right-panel {
      flex: 0 0 60%;
      padding: 32px;
      padding: 0;
      background: #f9fafc;
      display: flex;
      flex-direction: column;
    }

    .grid-title {
      font-size: 1.8rem;
      margin-bottom: 20px;
      margin-bottom: 0;
      font-weight: 700;
      color: #1e293b;
    }

    .product-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
      gap: 0;
    }

    /* tarjetas grid */
    .grid-card {
      background: var(--color-surface);
      border-radius: var(--border-radius-card);
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
      padding: 20px 18px 18px;
      padding: 0;
      display: flex;
      flex-direction: column;
      transition: var(--transition-default);
      border: 1px solid rgba(0,0,0,0.02);
      position: relative;
      overflow: hidden;
    }



    .discount-tag {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--color-discount-badge);
      background: #d32f2f;
      border-radius: 40px;
      border-radius: 0;
      padding: 8px 16px;
      padding: 0;
      font-weight: 800;
      font-size: 1.3rem;
      color: #1e1e1e;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      z-index: 2;
      border: 2px solid white;
    }


    .grid-image {
      height: 100%;
      width: 100%;
    }
    
    .grid-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .grid-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 6px 0 10px;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid-prices {
      display: flex;
      gap: 10px;
      gap: 0;
      flex-wrap: wrap;
      margin-top: 6px;
      margin-top: 0;
    }

    .mini-price {
      background: var(--color-price-bg);
      color: var(--color-price-text);
      padding: 8px 18px;
      padding: 0;
      border-radius: 40px;
      border-radius: 0;
      font-weight: 800;
      font-size: 1.3rem;
      box-shadow: 0 4px 0 #8b1e1e;
    }

    /* ========== ESTADO DE TRANSICIÓN SUAVE ========== */
    .featured-product, .grid-card {
      transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* pausa por hover en toda la pantalla */
    .signage.paused .featured-product,
    .signage.paused .grid-card {
      transition: none;
    }

    /* responsive para 1366x768 */
    @media (max-width: 1400px) {
      .signage {
        height: 760px;
      }
      .featured-name {
        font-size: 1.8rem;
      }
      .price-chip {
        font-size: 1.6rem;
        padding: 8px 16px;
      }
      .grid-name {
        font-size: 1.3rem;
      }
    }
  </style>
  <!-- importar fuente Inter (opcional pero mejora) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
  <main class="signage" id="signageContainer">
    <!-- COLUMNA IZQUIERDA (40%) -->
    <div class="left-panel">
      <div class="featured-product" id="featuredProduct">
        <!-- el badge se inyecta con js -->
        <div class="featured-image" id="featuredImage">
          <img src="https://via.placeholder.com/300x200/f5f5f7/aaa?text=producto" alt="producto">
        </div>
        <div class="featured-name" id="featuredName">Queso Cremoso</div>
        <div class="price-row" id="featuredPrices">
          <div class="price-chip">$2999</div>
          <div class="price-chip">$2999</div>
          <div class="price-chip">$2999</div>
        </div>
        <div class="featured-badge" id="featuredDiscount">7%</div>
      </div>

      <!-- PROMOCIONES BANCARIAS (exacto al diseño) -->
      <div class="bank-promos">
        <img src="assets/img/Diseño sin título (10).jpg" alt="">

      </div>
    </div>

    <!-- COLUMNA DERECHA (60%) -->
    <div class="right-panel">
      <div class="product-grid" id="productGrid">
        <!-- grid 2x2 generado por JS -->
      </div>
    </div>
  </main>

  <script>
    (function() {
      "use strict";

      // ---------- MODELO DE DATOS ----------
      const products = [
        { id: 1, name: "Queso Duy Cremoso", price: 2999, discount: 7, image: "assets/img/oferta1.png" },
        { id: 2, name: "Gaseosa Pepsi Clasica", price: 2999, discount: 7, image: "assets/img/oferta2.png" },
        { id: 3, name: "Vino Las Perdices", price: 2999, discount: 7, image: "assets/img/oferta3.png" }, 
        { id: 4, name: "Papas Lays", price: 1899, discount: 12, image: "assets/img/oferta4.png" },  
        { id: 5, name: "Dulce de Leche", price: 1250, discount: 10, image: "assets/img/oferta5.png" }, 
        { id: 6, name: "Yogur Ser", price: 990, discount: 15, image: "assets/img/oferta2.png" }, 
        { id: 7, name: "Arroz Gallo", price: 1340, discount: 8, image: "assets/img/oferta1.png" }, 
        { id: 8, name: "Atún Van Camp's", price: 2150, discount: 5, image: "assets/img/oferta2.png" },  
      ];
 
      // Referencias DOM
      const container = document.getElementById('signageContainer');
      const featuredDiv = document.getElementById('featuredProduct');
      const featuredImage = document.getElementById('featuredImage').querySelector('img');
      const featuredName = document.getElementById('featuredName');
      const featuredPrices = document.getElementById('featuredPrices');
      const featuredDiscount = document.getElementById('featuredDiscount');
      const gridContainer = document.getElementById('productGrid');

      let gridProducts = [];        // 4 productos en grid (orden actual)
      let featuredProduct = null;   // producto destacado actual
      let intervalId = null;
      let isPaused = false;

      // ---------- FUNCIONES DE RENDER ----------
      function renderFeatured(product) {
        if (!product) return;
        featuredImage.src = product.image;
        featuredImage.alt = product.name;
        featuredName.textContent = product.name;
        // 3 precios repetidos (cajas rojas)

      }

      function renderGrid(productsArray) {
        if (!gridContainer) return;
        let html = '';
        productsArray.forEach(p => {
          html += `
            <div class="grid-card" data-id="${p.id}">
              <div class="grid-image">
                <img src="${p.image}" alt="${p.name}" loading="lazy">
              </div>

            </div>
          `;
        });
        gridContainer.innerHTML = html;
      }

      // rotación horaria: el featured pasa a la última posición (grid[3]), y grid rota: grid[0]->grid[1], grid[1]->grid[2], grid[2]->grid[3], y grid[3] (que salía) se convierte en nuevo featured? 
      // pero la lógica pedida: producto principal pasa a una de las posiciones del grid, uno del grid pasa a principal, los productos rotan sentido horario.
      // interpretación: el featured se mueve a grid (lo colocamos en la posición que ocupaba el que sube a featured), y hacemos shift horario.
      // implementación robusta: grid lo tratamos como array de 4. Extraemos el que subirá a featured: puede ser el índice 0 (sentido horario, el primero se va a principal y el resto rota)
      // para sentido horario visual: en grid 2x2 (posiciones: 0 1 / 2 3). Horario: 0->1, 1->3, 3->2, 2->0? es ambiguo. Para mantener simple y vistoso: haremos que el nuevo featured sea el primer producto del grid (grid[0]), y el featured antiguo se coloque al final del grid (grid[3]), luego desplazamos 0,1,2 a 1,2,3? eso mueve en espiral.
      // pero "sentido horario" puede simularse moviendo índices: [0,1,2,3] -> después de rotar: [anterior_featured, 0, 1, 2] (el que estaba en 3 sale a featured). Eso es anti-horario. Para horario: nuevo_grid = [ grid[1], grid[2], grid[3], old_featured ] y nuevo_featured = grid[0]. Sí, eso hace que el grid gire a la izquierda pero el producto que se va a featured es el que estaba en grid[0] (arriba izquierda) y featured viejo pasa a la última casilla (abajo derecha). Efecto visual de rotación horaria entre celdas: 0->featured, 1->0, 2->1, 3->2, featured->3. ¡perfecto!
      function rotateStep() {
        if (isPaused) return;

        // guardar estado actual
        const oldFeatured = { ...featuredProduct }; 
        // grid actual (4 productos)
        const oldGrid = [...gridProducts];

        // nueva asignación:
        // nuevo featured = oldGrid[0] (el que estaba en primera posición del grid)
        const newFeatured = { ...oldGrid[0] };

        // nuevo grid = [ oldGrid[1], oldGrid[2], oldGrid[3], oldFeatured ] (rotación horaria)
        const newGrid = [
          { ...oldGrid[1] },
          { ...oldGrid[2] },
          { ...oldGrid[3] },
          { ...oldFeatured }
        ];

        // actualizar variables
        featuredProduct = newFeatured;
        gridProducts = newGrid;

        // renderizar con transición (el DOM se actualiza)
        renderFeatured(featuredProduct);
        renderGrid(gridProducts);
      }

      // Inicializar datos: elegir un featured inicial (por ej producto 0) y grid con los 4 siguientes
      function initData() {
        // barajar o tomar primeros 5, pero para que sea vistoso fijo:
        // destacado = products[0], grid = products[1,2,3,4]
        featuredProduct = { ...products[0] };
        gridProducts = [
          { ...products[1] },
          { ...products[2] },
          { ...products[3] },
          { ...products[4] }
        ];
        // si hay menos de 8 duplicamos precaución, pero tenemos 8.
        renderFeatured(featuredProduct);
        renderGrid(gridProducts);
      }

      // Control de pausa por hover
      function setupPauseOnHover() {
        container.addEventListener('mouseenter', () => {
          isPaused = true;
          container.classList.add('paused');
        });
        container.addEventListener('mouseleave', () => {
          isPaused = false;
          container.classList.remove('paused');
        });
      }

      // Iniciar carrusel
      function initCarousel(intervalMs = 4000) {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
          rotateStep();
        }, intervalMs);
      }

      // Limpieza opcional
      function destroyCarousel() {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      // Arranque
      document.addEventListener('DOMContentLoaded', () => {
        initData();
        initCarousel(4000);
        setupPauseOnHover();
      });

      // Exposición para debug (opcional)
      window.retail = { rotateStep, pause: () => isPaused = true, resume: () => isPaused = false };
    })();
  </script>
</body>
</html>
